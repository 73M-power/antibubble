# ============================================================
# 主流声音清单 —— 这里采集的是"大家正在热议、正在形成共识"的内容，
# 也就是茧房本身。LLM 拿到后会反过来戳破它们。
#
# 加新源：复制一段，填 name / type / url 即可。
#   type:  rss | hackernews
#   {RSSHUB}: 会被替换成 RSSHUB_BASE 环境变量（默认公共实例）
#
# 提示：源越多元（科技/社会/政治/商业混在一起），AI 能挖出的对立面越丰富。
# ============================================================

settings:
  max_topics: 6        # 每天最多归纳几个话题
  lookback_hours: 48   # 你的支柱源(健身/投资专栏)更新没新闻快，窗口放宽到 48h

sources:
  # ============ 你的专属支柱源（健身 / 投资 / 创业，按 profile 三根支柱配） ============
  # 放最前面，优先进入分析视野，确保你关心的领域每天都被覆盖，而非碰运气撞上头条。

  # ---- 💪 身体 / 健身（循证向，专治"饮食/recomp/CrossFit"那几条立场）----
  - name: Precision Nutrition 循证营养
    type: rss
    url: https://www.precisionnutrition.com/feed   # 饮食/recomp 的循证内容

  - name: Reddit r/Fitness
    type: rss
    url: https://www.reddit.com/r/Fitness/.rss

  - name: Reddit r/nutrition
    type: rss
    url: https://www.reddit.com/r/nutrition/.rss
  # - name: Reddit r/crossfit          # Reddit RSS 偶尔被限流，可选启用
  #   type: rss
  #   url: https://www.reddit.com/r/crossfit/.rss

  # ---- 📈 投资 / 宏观（含补你"美股不了解"的认知缺口）----
  - name: A Wealth of Common Sense
    type: rss
    url: https://awealthofcommonsense.com/feed/   # 长期 vs 择时，正顶你的保守立场

  - name: Investing.com 市场
    type: rss
    url: https://www.investing.com/rss/news.rss

  - name: Marginal Revolution 经济
    type: rss
    url: https://marginalrevolution.com/feed

  # ============ 全球泛热点（提供"你还没想到"的话题，负责发现而非对症） ============
  # ---------------- 科技圈共识 ----------------
  - name: Hacker News 热榜
    type: hackernews
    min_points: 150     # 只看真正高热的，代表性更强

  # ---------------- 全球主流叙事（英文大媒体，实测稳定） ----------------
  - name: BBC 世界
    type: rss
    url: https://feeds.bbci.co.uk/news/world/rss.xml

  - name: The Guardian
    type: rss
    url: https://www.theguardian.com/world/rss

  - name: NPR 头条
    type: rss
    url: https://feeds.npr.org/1001/rss.xml

  - name: TechCrunch
    type: rss
    url: https://techcrunch.com/feed/

  - name: Reddit 热门
    type: rss
    url: https://www.reddit.com/r/popular/.rss

  # ---------------- 观点多元源（专门提供"另一面"的原料，立场各异） ----------------
  # 让语料本身就含多种立场，反方就不全靠模型凭空想。
  - name: Reddit ChangeMyView
    type: rss
    url: https://www.reddit.com/r/changemyview/.rss   # 天生的"请反驳我"广场

  - name: Reddit 冷门观点
    type: rss
    url: https://www.reddit.com/r/unpopularopinion/.rss

  - name: The Guardian 评论
    type: rss
    url: https://www.theguardian.com/uk/commentisfree/rss   # 各路观点专栏

  # ---------------- 中文热点（需自建 RSSHub 后启用） ----------------
  # 公共 RSSHub 实例已被限流，自建后取消注释并把 RSSHUB_BASE 指向你的实例。
  # - name: 微博热搜
  #   type: rss
  #   url: "{RSSHUB}/weibo/search/hot"
  #
  # - name: 知乎热榜
  #   type: rss
  #   url: "{RSSHUB}/zhihu/hotlist"
  #
  # - name: 即刻热门
  #   type: rss
  #   url: "{RSSHUB}/jike/topic/square"
