# 你最关心的领域：AI 会优先从今天的热点里挑这些领域的话题来破壁。
interests:
  - AI 与就业
  - 投资与宏观经济
  - 健身与健康

# 你目前相信 / 倾向的判断：AI 会专门针对这些立场，给你它能想到的最有力反方。
# 这是「定制化」的核心——写下你真实的判断，让它来怼你。
stances:
  - "AI 会在几年内大幅取代初级程序员"
  - "长期看股市总会涨，无脑定投指数就行"
  # - "减肥的核心是饮食，运动消耗远低于摄入"

# 反方锋利度：gentle(温和提醒) / balanced(中立陈述) / sharp(犀利直击)
tone: balanced
